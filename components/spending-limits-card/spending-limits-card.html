<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spending limits card — FA Home</title>
  <link rel="stylesheet" href="../../_design-system/tokens.css" />
  <link rel="stylesheet" href="../shared.css" />
  <link rel="stylesheet" href="../card.css" />
  <link rel="stylesheet" href="spending-limits-card.css" />
  <style> .fa-main { max-width: 360px; } </style>
</head>
<body class="fa-page">
  <main class="fa-center">
    <div class="fa-main">
      <div class="fa-card fa-spending-limits-card">
        <div class="fa-spending-limits-header">
          <div class="fa-spending-limits-title-wrap">
            <span class="fa-spending-limits-title">Spending limits</span>
            <svg class="fa-icon-sail" width="12" height="12" viewBox="0 0 12 12" aria-hidden="true"><use href="../../_design-system/sail-icons.svg#info"/></svg>
          </div>
          <span class="fa-spending-limits-period">This month</span>
        </div>
        <div class="fa-spending-limits-list">
          <div class="fa-spending-limits-item">
            <div class="fa-spending-limits-bar">
              <span class="fa-spending-limits-bar-fill" style="flex: 0 0 98%;"></span>
              <span class="fa-spending-limits-bar-remainder"></span>
            </div>
            <div class="fa-spending-limits-data">
              <div class="fa-spending-limits-left">
                <span class="fa-spending-limits-mask">•••• 2345</span>
                <span class="fa-spending-limits-name">Cam Sackett</span>
              </div>
              <div class="fa-spending-limits-right">
                <span class="fa-spending-limits-amount">$489.93</span>
                <span class="fa-spending-limits-limit">$500.00 limit</span>
              </div>
            </div>
          </div>
          <div class="fa-spending-limits-item">
            <div class="fa-spending-limits-bar">
              <span class="fa-spending-limits-bar-fill" style="flex: 0 0 76.85%;"></span>
              <span class="fa-spending-limits-bar-remainder"></span>
            </div>
            <div class="fa-spending-limits-data">
              <div class="fa-spending-limits-left">
                <span class="fa-spending-limits-mask">•••• 8893</span>
                <span class="fa-spending-limits-name">Steven Johnson</span>
              </div>
              <div class="fa-spending-limits-right">
                <span class="fa-spending-limits-amount">$768.54</span>
                <span class="fa-spending-limits-limit">$1,000.00 limit</span>
              </div>
            </div>
          </div>
          <div class="fa-spending-limits-item">
            <div class="fa-spending-limits-bar">
              <span class="fa-spending-limits-bar-fill" style="flex: 0 0 35%;"></span>
              <span class="fa-spending-limits-bar-remainder"></span>
            </div>
            <div class="fa-spending-limits-data">
              <div class="fa-spending-limits-left">
                <span class="fa-spending-limits-mask">•••• 2345</span>
                <span class="fa-spending-limits-name">Mathilde Jeakins</span>
              </div>
              <div class="fa-spending-limits-right">
                <span class="fa-spending-limits-amount">$87.45</span>
                <span class="fa-spending-limits-limit">$250.00 limit</span>
              </div>
            </div>
          </div>
          <div class="fa-spending-limits-item">
            <div class="fa-spending-limits-bar">
              <span class="fa-spending-limits-bar-fill" style="flex: 0 0 42.15%;"></span>
              <span class="fa-spending-limits-bar-remainder"></span>
            </div>
            <div class="fa-spending-limits-data">
              <div class="fa-spending-limits-left">
                <span class="fa-spending-limits-mask">•••• 5643</span>
                <span class="fa-spending-limits-name">Jordan Anderson</span>
              </div>
              <div class="fa-spending-limits-right">
                <span class="fa-spending-limits-amount">$421.45</span>
                <span class="fa-spending-limits-limit">$1,000.00 limit</span>
              </div>
            </div>
          </div>
        </div>
        <div class="fa-spending-limits-footer">
          <a href="#" class="fa-spending-limits-view-all">View all</a>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
