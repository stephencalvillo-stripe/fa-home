<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dispute activity card — FA Home</title>
  <link rel="stylesheet" href="../../_design-system/tokens.css" />
  <link rel="stylesheet" href="../shared.css" />
  <link rel="stylesheet" href="dispute-activity-card.css" />
  <style> .fa-main { max-width: 360px; } </style>
</head>
<body class="fa-page">
  <main class="fa-center">
    <div class="fa-main">
      <div class="fa-dispute-activity-card">
        <div class="fa-dispute-activity-header">
          <span class="fa-dispute-activity-title">Dispute activity</span>
          <svg class="fa-icon-sail" width="12" height="12" viewBox="0 0 12 12" aria-hidden="true"><use href="../../_design-system/sail-icons.svg#info"/></svg>
        </div>
        <div class="fa-dispute-activity-metric">
          <span class="fa-dispute-activity-value">37%</span>
          <span class="fa-dispute-activity-delta">+1.2%</span>
        </div>
        <div class="fa-dispute-activity-chart">
          <div class="fa-dispute-activity-chart-y">
            <span>40%</span>
            <span>20%</span>
            <span>0%</span>
          </div>
          <div class="fa-dispute-activity-chart-x">
            <span>Dec 1</span>
            <span>Dec 7</span>
          </div>
          <svg class="fa-dispute-activity-chart-svg" viewBox="0 0 300 140" fill="none">
            <path d="M0 100 L50 85 L100 90 L150 70 L200 60 L250 55 L300 50" stroke="var(--fa-brand)" stroke-width="2" fill="none" class="fa-dispute-activity-line--current"/>
            <path d="M0 95 L50 88 L100 92 L150 80 L200 75 L250 72 L300 68" stroke="#BAC8DA" stroke-width="1.5" stroke-dasharray="4 4" fill="none" class="fa-dispute-activity-line--previous"/>
          </svg>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
