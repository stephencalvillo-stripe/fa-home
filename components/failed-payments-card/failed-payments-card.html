<!DOCTYPE html>

<head>

              </div>

            </div>
            <div class="fa-failed-payments-item">
              <div class="fa-failed-payments-main">

            <div class="fa-failed-payments-item">

            </div>
            <div class="fa-failed-payments-item">
              <div class="fa-failed-payments-main">
                <span class="fa-failed-payments-value">$100.00</span>
                <span class="fa-failed-payments-meta">Apr 24, 12:50 PM • pi_2N0uUW589O8KAx</span>
              </div>
              <span class="fa-failed-payments-badge fa-badge fa-badge-canceled">Canceled</span>
            </div>
          </div>
          <div class="fa-failed-payments-footer">
            <a href="#" class="fa-failed-payments-view-more">View more</a>
          </div>
        </div>
      </div>
    </div>
  </main>

</html>
