<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Incoming earnings module — FA Home</title>
  <link rel="stylesheet" href="../../_design-system/tokens.css" />
  <link rel="stylesheet" href="../shared.css" />
  <link rel="stylesheet" href="incoming-earnings-module.css" />
  <style> .fa-main { max-width: 340px; } body { margin: 0; } </style>
</head>
<body class="fa-page">
  <main class="fa-center">
    <div class="fa-main">
      <a href="#" class="fa-incoming-earnings-module">
        <div class="fa-incoming-earnings-header">
          <span class="fa-incoming-earnings-label">Incoming earnings</span>
          <div class="fa-incoming-earnings-period-wrap">
            <span class="fa-incoming-earnings-period">this month</span>
          </div>
        </div>
        <div class="fa-incoming-earnings-data">
          <div class="fa-incoming-earnings-value-chart">
            <p class="fa-incoming-earnings-value">$12,450.00</p>
            <div class="fa-incoming-earnings-bars">
              <span style="height: 60%;"></span>
              <span style="height: 80%;"></span>
              <span style="height: 45%;"></span>
              <span style="height: 90%;"></span>
              <span style="height: 70%;"></span>
            </div>
          </div>
          <span class="fa-incoming-earnings-arrow" aria-hidden="true">
            <svg class="fa-icon-sail" width="16" height="16" viewBox="0 0 24 24" aria-hidden="true"><use href="../../_design-system/sail-icons.svg#arrowRight"/></svg>
          </span>
        </div>
      </a>
    </div>
  </main>
</body>
</html>
