<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Overview header — FA Home</title>
  <link rel="stylesheet" href="../../_design-system/tokens.css" />
  <link rel="stylesheet" href="../shared.css" />
  <link rel="stylesheet" href="overview-header.css" />
</head>
<body class="fa-page">
  <main class="fa-center">
    <div class="fa-main">
      <section class="fa-overview">
        <div class="fa-overview-header">
          <h2 class="fa-overview-title">Your overview</h2>
          <div class="fa-overview-actions-row">
            <div class="fa-overview-chips">
              <span class="fa-chip"><span class="fa-chip-label">Date range</span><span class="fa-chip-sep"></span><span class="fa-chip-value">Last 4 weeks</span><svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></span>
              <span class="fa-chip"><span class="fa-chip-value">Daily</span><svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></span>
              <span class="fa-chip"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg><span class="fa-chip-label">Compare</span><span class="fa-chip-sep"></span><span class="fa-chip-value">Previous period</span><svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></span>
            </div>
            <button type="button" class="fa-btn-customize"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg> Customize</button>
          </div>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
