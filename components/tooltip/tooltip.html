<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tooltip — FA Home</title>
  <link rel="stylesheet" href="../../_design-system/tokens.css" />
  <link rel="stylesheet" href="../shared.css" />
  <link rel="stylesheet" href="tooltip.css" />
  <style> body { padding: 48px; } </style>
</head>
<body class="fa-page">
  <p style="margin-bottom: 16px;">Hover the info icon to show the tooltip:</p>
  <span class="fa-tooltip-wrap">
    <span role="button" aria-label="More information" style="display: inline-flex; color: #667691; cursor: pointer;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
    </span>
    <span class="fa-tooltip" role="tooltip">All money received (sales, investments, transfers, loans)</span>
  </span>
</body>
</html>
