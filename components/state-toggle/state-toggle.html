<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>State toggle — FA Home</title>
  <link rel="stylesheet" href="../../_design-system/tokens.css" />
  <link rel="stylesheet" href="../shared.css" />
  <link rel="stylesheet" href="state-toggle.css" />
  <style>
    body { padding: 120px 24px 80px; }
    /* Preview: show thumb under "FA enabled" (middle option) */
    .fa-state-toggle__thumb { width: 82px; left: 86px; }
  </style>
</head>
<body class="fa-page">
  <p style="margin-bottom: 16px; color: var(--fa-text-subdued);">Floating state toggle (fixed lower-left in full app):</p>
  <div class="fa-floating-toggles">
    <div class="fa-state-toggle">
      <div class="fa-state-toggle__track">
        <span class="fa-state-toggle__thumb" aria-hidden="true"></span>
        <button type="button" class="fa-state-toggle__option" aria-selected="false">Payments only</button>
        <button type="button" class="fa-state-toggle__option" aria-selected="true">FA enabled</button>
        <button type="button" class="fa-state-toggle__option" aria-selected="false">FA Borderless</button>
      </div>
    </div>
  </div>
</body>
</html>
