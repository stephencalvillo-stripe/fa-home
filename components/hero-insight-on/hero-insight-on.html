<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hero — Payments only + Insight ON (Add FA card) — FA Home</title>
  <link rel="stylesheet" href="../../_design-system/tokens.css" />
  <link rel="stylesheet" href="../shared.css" />
  <link rel="stylesheet" href="../insight-card/insight-card.css" />
  <link rel="stylesheet" href="hero-insight-on.css" />
  <style>
    .fa-main { max-width: 360px; }
    .fa-hero-payments-insight-on { position: relative; }
    .fa-insight-card--add-fa { display: flex !important; opacity: 1 !important; }
  </style>
</head>
<body class="fa-page">
  <main class="fa-center">
    <div class="fa-main">
      <div class="fa-hero-payments-insight-on">
        <div class="fa-insight-card fa-insight-card--add-fa">
          <div class="fa-insight-card-add-fa__gradient"></div>
          <button type="button" class="fa-insight-card__close" aria-label="Dismiss">×</button>
          <h3 class="fa-insight-card__title">Get a card and spend directly from your balance</h3>
          <p class="fa-insight-card-add-fa__headline">Store, send, and spend in multiple currencies.</p>
          <p class="fa-insight-card-add-fa__description">Financial Account cards let you spend from your balance with no extra steps.</p>
          <a href="#" class="fa-insight-card__link" style="margin-bottom: 24px;">Get started</a>
          <div class="fa-insight-card-add-fa__card-visual">
            <span class="fa-insight-card-add-fa__card-chip"></span>
            <span class="fa-insight-card-add-fa__card-logo"></span>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
