<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hero modules — FA Borderless — FA Home</title>
  <link rel="stylesheet" href="../../_design-system/tokens.css" />
  <link rel="stylesheet" href="../shared.css" />
  <link rel="stylesheet" href="../balance-module/balance-module.css" />
  <link rel="stylesheet" href="../money-in-module/money-in-module.css" />
  <link rel="stylesheet" href="../money-out-module/money-out-module.css" />
  <link rel="stylesheet" href="hero-modules-borderless.css" />
  <style> .fa-main { max-width: 1052px; } .fa-center-wrap { margin-left: 0; } .fa-lifetime-yield-card { background: #fff; border: 1px solid #ECF1F6; border-radius: 8px; padding: 16px; min-height: 80px; } </style>
</head>
<body class="fa-page" data-dashboard-state="fa-borderless">
  <main class="fa-center">
    <div class="fa-main">
      <div class="fa-hero-state-borderless">
        <div class="fa-hero-modules-borderless">
          <div class="fa-balance-module fa-balance-module--borderless">
            <div class="fa-balance-heading">
              <div class="fa-balance-main">
                <p class="fa-balance-value">$72,450.32</p>
                <div class="fa-balance-breakdown">
                  <span>$29,038.81 USD</span>
                  <span>€28,320.50 EUR</span>
                </div>
              </div>
            </div>
            <div class="fa-balance-chart">
              <div class="fa-balance-chart-inner">
                <svg class="fa-balance-line" viewBox="0 0 470 162" fill="none" style="width:100%; height:100%;"><path d="M0 120 Q47 100 94 110 T188 85 T282 55 T376 45 T470 20" stroke="#9966FF" stroke-width="2" fill="none"/></svg>
              </div>
              <div class="fa-balance-timerange">
                <span>Dec 1</span>
                <span>Dec 31</span>
              </div>
            </div>
          </div>
          <div class="fa-hero-modules-borderless__col">
            <a href="#" class="fa-money-in-module">
              <div class="fa-money-in-header">
                <span class="fa-money-in-label">Money in</span>
                <span class="fa-money-in-period">this month</span>
              </div>
              <div class="fa-money-in-value-row">
                <p class="fa-money-in-value">$180,000.00</p>
              </div>
            </a>
            <div class="fa-money-out-module">
              <div class="fa-money-out-header">
                <span class="fa-money-out-label">Money out</span>
                <span class="fa-money-out-period">this month</span>
              </div>
              <div class="fa-money-out-value-row">
                <p class="fa-money-out-value">$42,000.00</p>
              </div>
            </div>
            <div class="fa-lifetime-yield-card">
              <span style="font-size: 14px; font-weight: 600;">Lifetime yield earned</span>
              <p style="font-size: 16px; margin: 4px 0 0;">$1,240.50</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
